<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIRTHDAY NI PANGET</title>
    <meta name="description" content="A birthday gift for your special day!">
    <style>
        body {
            background-image: url('cute-cat-holding-birthday-cake-cartoon-vector-icon-illustration-animal-food-icon-concept-isolated_138676-8501.avif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-color: #2c3e50;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(15px) saturate(1.2);
            border: 2px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 100;
        }

        h1 {
            font-size: 3.5rem;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        #infoPara {
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            margin-top: 30px;
            display: none;
        }

        #infoPara.show { display: block; }

        /* --- HEART IMAGE STYLES --- */
        .heart-photo {
            position: fixed;
            width: 80px; 
            height: 80px;
            z-index: 10;
            transition: opacity 1s ease-out, transform 1s ease-out;
            pointer-events: none;
            clip-path: url(#heart-clip); 
            background: #FF69B4; 
            margin-left: -40px; 
            margin-top: -40px;
        }

        .heart-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            clip-path: url(#heart-clip);
            transform: scale(0.92); 
        }

        #svg-definitions { position: absolute; width: 0; height: 0; overflow: hidden; }
    </style>
</head>
<body>

    <svg id="svg-definitions">
        <defs>
            <clipPath id="heart-clip" clipPathUnits="objectBoundingBox">
                <path d="M0.5,0.17 C0.4,-0.1 0,0 0,0.3 C0,0.6 0.5,0.95 0.5,0.95 C0.5,0.95 1,0.6 1,0.3 C1,0 0.6,-0.1 0.5,0.17"></path>
            </clipPath>
        </defs>
    </svg>

    <div class="container">
        <h1>HAPPY BIRTHDAY</h1>
        <button id="showBtn">🎉 OPEN 🎂</button>
        <p id="infoPara">Happy Birthday, Panget! Have an awesome day filled with cake and joy! 🥳</p>
    </div>

    <audio id="bgAudio" src="ssstik.io_1775746779183.mp3" loop preload="auto"></audio>

    <script>
        const bgAudio = document.getElementById('bgAudio');
        const showBtn = document.getElementById('showBtn');
        const infoPara = document.getElementById('infoPara');
        const imageNames = [
            'IMG_20260319_175521.jpg','IMG_20260319_181906.jpg',
            'IMG_20260319_182631.jpg',
            'IMG_20260319_182822.jpg',
            'IMG_20260319_182850.jpg',
            'IMG_20260319_182854.jpg',
            'IMG_20260324_174944.jpg',
            'IMG_20260324_201435.jpg',
            'IMG_20260324_214911_951.webp',
            'IMG_20260324_214923_433.webp',
            'IMG_20260401_171753.jpg',
            'IMG_20260401_171829_1.jpg',
            'IMG_20260401_174747.jpg',
            'IMG_20260401_174751.jpg',
            'IMG_20260401_174935.jpg',
            'IMG_20260401_202114.jpg',
            'IMG_20260401_202257.jpg',
            'IMG_20260401_202421.jpg',
            'IMG_20260401_204505.jpg',
            'IMG_20260401_231141_714.webp',
            'KAPI_FUJI-X_260401044741856.jpg',
            'KAPI_FUJI-X_260401044912615.jpg',
            'KAPI_FUJI-X_260401052443421.jpg',
            'KAPI_FUJI-X_260401055109305 (1).jpg',
            'KAPI_FUJI-X_260401055109305.jpg',
            'KAPI_FUJI-X_260401055119052.jpg',
            'KAPI_FUJI-X_260401063809000.jpg',
            'KAPI_FUJI-X_260401063818873.jpg',
            'KAPI_FUJI-X_260401064339783.jpg',
            'KAPI_FUJI-X_260401064614766.jpg',
            'IMG_20260401_231204_731.webp',
            'Messenger_creation_E33E6775-D225-4429-BA2F-436192151FAD.jpeg',
            'MVIMG_20260308_191113.jpg',
            'MVIMG_20260310_124843_1.jpg',
            'MVIMG_20260310_124843.jpg'
        ];

        let currentImageSet = 0;

        showBtn.onclick = function() {
            infoPara.classList.add('show');
            this.style.display = 'none';
            
            bgAudio.muted = false;
            bgAudio.volume = 0.5;
            bgAudio.play().catch(e => console.log("Audio play blocked."));
            
            setTimeout(() => { if(!bgAudio.muted) bgAudio.volume = 0.3; }, 3000);
            
            // Only start the heart image formation
            startImageFormation();
        };

        function startImageFormation() {
            const numImages = 14; 
            const scale = Math.min(window.innerWidth, window.innerHeight) * 0.025; 
            
            const spawnImages = () => {
                document.querySelectorAll('.heart-photo').forEach(el => el.remove());
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;

                for (let i = 0; i < numImages; i++) {
                    const t = (i / numImages) * Math.PI * 2;
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    
                    const container = document.createElement('div');
                    container.className = 'heart-photo';
                    container.style.left = `${centerX + (x * scale)}px`;
                    container.style.top = `${centerY + (y * scale)}px`;
                    container.style.opacity = '0';

                    const img = document.createElement('img');
                    img.src = 'images/' + imageNames[(currentImageSet * numImages + i) % imageNames.length];
                    img.onerror = function() { this.parentElement.remove(); };

                    container.appendChild(img);
                    document.body.appendChild(container);
                    setTimeout(() => container.style.opacity = '1', 50);
                }
                currentImageSet++;
            };

            spawnImages();
            setInterval(spawnImages, 6000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                bgAudio.muted = !bgAudio.muted;
            }
        });
    </script>
</body>
</html>
